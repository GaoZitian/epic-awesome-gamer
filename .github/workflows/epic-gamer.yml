name: Epic Awesome Gamer (Scheduled AiHubMix)

on:
  workflow_dispatch: # 手动触发
  schedule:
    # 每天 UTC 05:00 (北京时间 13:00) 运行一次
    - cron: '0 5 * * *'

jobs:
  epic-gamer:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    if: github.repository != '10000ge10000/epic-awesome-gamer'

    steps:
      - name: Debug GEMINI key fingerprint
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "GEMINI_API_KEY is EMPTY"
            exit 1
          fi
          echo -n "len="
          printf "%s" "$GEMINI_API_KEY" | wc -c
          echo -n "sha256_12="
          printf "%s" "$GEMINI_API_KEY" | sha256sum | cut -c1-12

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxml2-dev libxslt-dev \
            fonts-liberation libnss3 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libasound2t64 libatk1.0-0 libatk-bridge2.0-0 \
            libgtk-3-0 libnspr4 libwayland-client0 xdg-utils libdrm2 \
            libdbus-1-3 libcups2 libatspi2.0-0 libxkbcommon0

      - name: Install dependencies
        run: uv sync

      - name: Patch hcaptcha-challenger (extend all timeouts to 90s + relaxed frame matching)
        run: |
          set -euo pipefail
          SP=$(uv run python -c "import site; print(site.getsitepackages()[0])")
          echo "Targeting: $SP"

          COLLECTOR="${SP}/hcaptcha_challenger/agent/collector.py"
          CHALLENGER="${SP}/hcaptcha_challenger/agent/challenger.py"

          # 1) collector.py: payload timeout 10s -> 90s
          sed -i 's/timeout=10\n/timeout=float(os.getenv("HCAPTCHA_PAYLOAD_TIMEOUT", "90"))\n/g' "$COLLECTOR"
          sed -i 's/timeout=10)/timeout=float(os.getenv("HCAPTCHA_PAYLOAD_TIMEOUT", "90")))/g' "$COLLECTOR"
          echo "✅ collector.py: payload timeout -> 90s"

          # 2) challenger.py: extend 3 timeout locations + relaxed frame matching
          cat > /tmp/patch_challenger.py << 'PYEOF'
          import sys
          from pathlib import Path

          sp = sys.argv[1]
          p = Path(sp) / "hcaptcha_challenger" / "agent" / "challenger.py"
          text = p.read_text()
          patched = []

          # A. RESPONSE_TIMEOUT: 30 -> 90
          old = 'RESPONSE_TIMEOUT: float = Field(\n            default=30,'
          new = 'RESPONSE_TIMEOUT: float = Field(\n            default=90,'
          if old in text:
              text = text.replace(old, new, 1)
              patched.append("RESPONSE_TIMEOUT default 30->90")

          # B. _review_challenge_type payload wait: timeout=30.0 -> 90.0
          old2 = 'self._captcha_payload = await asyncio.wait_for(\n            self._captcha_payload_queue.get(), timeout=30.0\n        )'
          new2 = 'self._captcha_payload = await asyncio.wait_for(\n            self._captcha_payload_queue.get(), timeout=float(os.getenv("HCAPTCHA_PAYLOAD_TIMEOUT", "90"))\n        )'
          if old2 in text:
              text = text.replace(old2, new2, 1)
              patched.append("_review_challenge_type timeout 30->90")
          else:
              # fallback: replace any remaining timeout=30.0
              if 'timeout=30.0' in text:
                  text = text.replace('timeout=30.0', 'timeout=float(os.getenv("HCAPTCHA_PAYLOAD_TIMEOUT", "90"))')
                  patched.append("timeout=30.0 -> 90 (fallback)")

          # C. wait_for_challenge RESPONSE_TIMEOUT usage (already covered by A)
          # D. get_challenge_frame_locator: add 90s deadline loop
          old_loop = 'while True:\n            try:'
          new_loop = 'deadline = asyncio.get_running_loop().time() + 90\n            try:\n            while time.monotonic() < deadline:'
          if old_loop in text:
              text = text.replace(old_loop, new_loop, 1)
              patched.append("frame locator: while True -> 90s deadline loop")

          old_break = 'if asyncio.get_running_loop().time() >= deadline:\n                break'
          new_break = 'if time.monotonic() >= deadline:\n                break'
          if old_break in text:
              text = text.replace(old_break, new_break, 1)

          # E. Relax frame URL matching
          old_frame = 'and child_frame.url.startswith("https://newassets.hcaptcha.com/captcha/v1/")\n                and "frame=challenge" in child_frame.url'
          new_frame = 'and "hcaptcha.com" in (child_frame.url or "")\n                and "frame=challenge" in (child_frame.url or "")'
          if old_frame in text:
              text = text.replace(old_frame, new_frame, 1)
              patched.append("frame URL: relaxed to hcaptcha.com match")

          p.write_text(text)
          for msg in patched:
              print(f"  ✅ {msg}")
          print(f"✅ challenger.py: {len(patched)} patches applied")
          PYEOF

          uv run python /tmp/patch_challenger.py "$SP"

      - name: Install Playwright browsers
        run: uv run playwright install firefox

      - name: Install Camoufox
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run camoufox fetch

      - name: Run Epic Awesome Gamer
        env:
          EPIC_EMAIL: ${{ secrets.EPIC_EMAIL }}
          EPIC_PASSWORD: ${{ secrets.EPIC_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_BASE_URL: ${{ secrets.GEMINI_BASE_URL != '' && secrets.GEMINI_BASE_URL || 'https://aihubmix.com' }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL != '' && secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}
          CHALLENGE_CLASSIFIER_MODEL: gemini-2.5-flash
          IMAGE_CLASSIFIER_MODEL: gemini-2.5-flash
          SPATIAL_POINT_REASONER_MODEL: gemini-2.5-flash
          SPATIAL_PATH_REASONER_MODEL: gemini-2.5-flash
          IMAGE_CLASSIFIER_THINKING_BUDGET: 192
          SPATIAL_POINT_THINKING_BUDGET: 256
          SPATIAL_PATH_THINKING_BUDGET: 320
          ENABLE_APSCHEDULER: false
          PYTHONPATH: app
          ENABLE_AIHUBMIX_PATCH: true
          HCAPTCHA_PAYLOAD_TIMEOUT: "90"
          HCAPTCHA_FRAME_TIMEOUT: "90"
        run: |
          echo "🚀 启动定时领取任务..."
          xvfb-run --auto-servernum --server-num=1 --server-args='-screen 0, 1920x1080x24' uv run app/deploy.py
