name: Epic Awesome Gamer (Scheduled AiHubMix)

on:
  workflow_dispatch: # 手动触发
  schedule:
    # 每天 UTC 05:00 (北京时间 13:00) 运行一次
    - cron: '0 5 * * *'

jobs:
  epic-gamer:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    # 🔴 [核心修改] 只有当仓库不是 '10000ge10000/epic-awesome-gamer' 时才运行
    # 效果：你的仓库触发定时任务会直接显示 Skipped (灰色)，别人 Fork 后会正常运行 (绿色)
    if: github.repository != '10000ge10000/epic-awesome-gamer'

    steps:
      - name: Debug GEMINI key fingerprint
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "GEMINI_API_KEY is EMPTY"
            exit 1
          fi
          echo -n "len="
          printf "%s" "$GEMINI_API_KEY" | wc -c
          echo -n "sha256_12="
          printf "%s" "$GEMINI_API_KEY" | sha256sum | cut -c1-12

    
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxml2-dev libxslt-dev \
            fonts-liberation libnss3 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libasound2t64 libatk1.0-0 libatk-bridge2.0-0 \
            libgtk-3-0 libnspr4 libwayland-client0 xdg-utils libdrm2 \
            libdbus-1-3 libcups2 libatspi2.0-0 libxkbcommon0

      - name: Install dependencies
        run: uv sync

      - name: Patch hcaptcha-challenger for robust iframe detection
        run: |
          set -euo pipefail
          
          # 写入 patch 脚本到临时文件
          cat > /tmp/patch_hcaptcha.py << 'PYEOF'
          import site
          from pathlib import Path

          sp = site.getsitepackages()[0]
          challenger = Path(sp) / "hcaptcha_challenger" / "agent" / "challenger.py"
          collector = Path(sp) / "hcaptcha_challenger" / "agent" / "collector.py"
          
          # Patch collector: 延长 payload 等待时间（10s → 90s）
          collector_text = collector.read_text()
          collector_text = collector_text.replace(
              'timeout=10\n',
              'timeout=float(os.getenv("HCAPTCHA_PAYLOAD_TIMEOUT", "90"))\n'
          )
          collector.write_text(collector_text)
          print("✅ Patched collector.py: timeout 10s -> 90s")
          
          # Patch challenger: 放宽 challenge frame URL 匹配
          text = challenger.read_text()
          old_frame = 'and child_frame.url.startswith("https://newassets.hcaptcha.com/captcha/v1/")\n                and "frame=challenge" in child_frame.url'
          new_frame = 'and "hcaptcha.com" in (child_frame.url or "")\n                and "frame=challenge" in (child_frame.url or "")'
          if old_frame in text:
              text = text.replace(old_frame, new_frame, 1)
              print("✅ Patched frame URL matching to relaxed hcaptcha.com match")
          else:
              print("⚠️ Frame URL pattern not found in challenger.py")
          
          # Patch challenger: 延长 get_challenge_frame_locator 超时
          old_loop = 'while True:\n            try:'
          new_loop = 'deadline = asyncio.get_running_loop().time() + 90\n            try:\n            while time.monotonic() < deadline:'
          if old_loop in text:
              text = text.replace(old_loop, new_loop, 1)
              print("✅ Patched frame locator with extended timeout")
          else:
              print("⚠️ Loop pattern not found, trying alternate...")
              text = text.replace(
                  'while True:',
                  'deadline = time.monotonic() + 90\n        while time.monotonic() < deadline:',
                  1
              )
              print("✅ Patched frame locator with extended timeout (alt)")
          
          challenger.write_text(text)
          PYEOF
          
          python3 /tmp/patch_hcaptcha.py
          echo "hcaptcha-challenger patched successfully"

      - name: Install Playwright browsers
        run: uv run playwright install firefox

      # 增加 GITHUB_TOKEN 以解决 Camoufox 下载时的 403 频率限制
      - name: Install Camoufox
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run camoufox fetch

      - name: Run Epic Awesome Gamer
        env:
          EPIC_EMAIL: ${{ secrets.EPIC_EMAIL }}
          EPIC_PASSWORD: ${{ secrets.EPIC_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_BASE_URL: ${{ secrets.GEMINI_BASE_URL != '' && secrets.GEMINI_BASE_URL || 'https://aihubmix.com' }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL != '' && secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}
          CHALLENGE_CLASSIFIER_MODEL: gemini-2.5-flash
          IMAGE_CLASSIFIER_MODEL: gemini-2.5-flash
          SPATIAL_POINT_REASONER_MODEL: gemini-2.5-flash
          SPATIAL_PATH_REASONER_MODEL: gemini-2.5-flash
          IMAGE_CLASSIFIER_THINKING_BUDGET: 192
          SPATIAL_POINT_THINKING_BUDGET: 256
          SPATIAL_PATH_THINKING_BUDGET: 320
          # 在 Actions 中我们依靠 GitHub 的 cron 触发，所以关闭内部调度器
          ENABLE_APSCHEDULER: false
          PYTHONPATH: app
          ENABLE_AIHUBMIX_PATCH: true
          # hcaptcha-challenger 补丁使用这些环境变量
          HCAPTCHA_PAYLOAD_TIMEOUT: "90"
          HCAPTCHA_FRAME_TIMEOUT: "90"
        run: |
          echo "🚀 启动定时领取任务（已适配 AiHubMix 中转）..."
          echo "GEMINI_BASE_URL=${GEMINI_BASE_URL}"
          echo "GEMINI_MODEL=${GEMINI_MODEL}"
          xvfb-run --auto-servernum --server-num=1 --server-args='-screen 0, 1920x1080x24' uv run app/deploy.py
