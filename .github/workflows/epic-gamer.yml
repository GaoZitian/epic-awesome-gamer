name: Epic Awesome Gamer (Scheduled AiHubMix)

on:
  workflow_dispatch: # 手动触发
  schedule:
    # 每天 UTC 05:00 (北京时间 13:00) 运行一次
    - cron: '0 5 * * *'

jobs:
  epic-gamer:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    if: github.repository != '10000ge10000/epic-awesome-gamer'

    steps:
      - name: Debug GEMINI key fingerprint
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "GEMINI_API_KEY is EMPTY"
            exit 1
          fi
          echo -n "len="
          printf "%s" "$GEMINI_API_KEY" | wc -c
          echo -n "sha256_12="
          printf "%s" "$GEMINI_API_KEY" | sha256sum | cut -c1-12

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxml2-dev libxslt-dev \
            fonts-liberation libnss3 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libasound2t64 libatk1.0-0 libatk-bridge2.0-0 \
            libgtk-3-0 libnspr4 libwayland-client0 xdg-utils libdrm2 \
            libdbus-1-3 libcups2 libatspi2.0-0 libxkbcommon0

      - name: Install dependencies
        run: uv sync

      - name: Patch hcaptcha-challenger (extend all timeouts to 90s + relaxed frame matching)
        run: |
          set -euo pipefail
          SP=$(uv run python -c "import site; print(site.getsitepackages()[0])")
          echo "Targeting: $SP"

          COLLECTOR="${SP}/hcaptcha_challenger/agent/collector.py"
          CHALLENGER="${SP}/hcaptcha_challenger/agent/challenger.py"

          # 1) collector.py: payload timeout 10s -> 90s
          sed -i 's/timeout=10)/timeout=float(os.getenv("HCAPTCHA_PAYLOAD_TIMEOUT", "90")))/g' "$COLLECTOR"
          echo "OK collector.py: payload timeout -> 90s"

          # 2) challenger.py: decode and run patch script
          echo '' | base64 -d > /tmp/run_patch.py
          uv run python /tmp/run_patch.py "$SP"

      - name: Install Playwright browsers
        run: uv run playwright install firefox

      - name: Install Camoufox
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run camoufox fetch

      - name: Run Epic Awesome Gamer
        env:
          EPIC_EMAIL: ${{ secrets.EPIC_EMAIL }}
          EPIC_PASSWORD: ${{ secrets.EPIC_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_BASE_URL: ${{ secrets.GEMINI_BASE_URL != '' && secrets.GEMINI_BASE_URL || 'https://aihubmix.com' }}'
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL != '' && secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}'
          CHALLENGE_CLASSIFIER_MODEL: gemini-2.5-flash
          IMAGE_CLASSIFIER_MODEL: gemini-2.5-flash
          SPATIAL_POINT_REASONER_MODEL: gemini-2.5-flash
          SPATIAL_PATH_REASONER_MODEL: gemini-2.5-flash
          IMAGE_CLASSIFIER_THINKING_BUDGET: 192
          SPATIAL_POINT_THINKING_BUDGET: 256
          SPATIAL_PATH_THINKING_BUDGET: 320
          ENABLE_APSCHEDULER: false
          PYTHONPATH: app
          ENABLE_AIHUBMIX_PATCH: true
          HCAPTCHA_PAYLOAD_TIMEOUT: "90"
          HCAPTCHA_FRAME_TIMEOUT: "90"
        run: |
          echo "🚀 启动定时领取任务..."
          xvfb-run --auto-servernum --server-num=1 --server-args='-screen 0, 1920x1080x24' uv run app/deploy.py
